esphome:
  name: esp32cam-flash
  friendly_name: ESP32-CAM Flash

esp32:
  board: esp32cam
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

switch:
  - platform: gpio
    name: "Flash LED (GPIO4)"
    id: flash_led
    pin:
      number: GPIO4
      mode: OUTPUT
      inverted: false
    restore_mode: ALWAYS_OFF
    icon: mdi:flashlight

  - platform: gpio
    name: "Channel 1 (GPIO13)"
    id: channel_1
    pin:
      number: GPIO13
      mode: OUTPUT
      inverted: false
    restore_mode: ALWAYS_OFF
    icon: mdi:lightbulb

  - platform: gpio
    name: "Channel 2 (GPIO14)"
    id: channel_2
    pin:
      number: GPIO14
      mode: OUTPUT
      inverted: false
    restore_mode: ALWAYS_OFF
    icon: mdi:lightbulb

  - platform: gpio
    name: "Channel 3 (GPIO15)"
    id: channel_3
    pin:
      number: GPIO15
      mode: OUTPUT
      inverted: false
    restore_mode: ALWAYS_OFF
    icon: mdi:lightbulb
