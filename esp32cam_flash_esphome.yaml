esphome:
  name: esp32cam-flash
  friendly_name: ESP32-CAM Flash

esp32:
  board: esp32cam
  framework:
    type: arduino

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

switch:
  - platform: gpio
    name: "Flash"
    id: flash_led
    pin:
      number: GPIO4
      mode: OUTPUT
      inverted: false
    restore_mode: ALWAYS_OFF
    icon: mdi:flashlight
